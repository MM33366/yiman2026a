<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>縣市氣象查詢</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; background-color: #e3f2fd; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; }
        input[type="text"] { padding: 8px; width: 60%; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background-color: #2196f3; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background-color: #f1f8e9; border-left: 5px solid #4caf50; }
        .error { color: red; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>☁️ 縣市氣象預報</h2>
        
        <form method="POST">
            <input type="text" name="city" placeholder="請輸入縣市名稱 (如：台中)" required>
            <button type="submit">查詢</button>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        {% if result %}
            <div class="result">
                <h3>{{ result.city }} 目前天氣預報</h3>
                <p>☁️ 天氣狀況：<strong>{{ result.weather }}</strong></p>
                <p>☔ 降雨機率：<strong>{{ result.rain }}%</strong></p>
            </div>
        {% endif %}

        <br>
        <a href="/">回到首頁</a>
    </div>
</body>
</html>
